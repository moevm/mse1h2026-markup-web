<section class="section-welcome">
  <div class="section-welcome__welcome-image-box">
    <img class="section-welcome__welcome-image" src="/img/svg/welcome-image.svg" alt="welcome-image">
  </div>
  <h1 class="section-welcome__title">
    Добро пожаловать
  </h1>
  <p class="section-welcome__text">
    Начните работу с изображениями, загрузив
новый набор данных или продолжив текущий
проект.
  </p>
</section>

<section class="section-datasets-choose">
  <button class="section-datasets-choose__button section-datasets-choose__button--load-new">
    <img
      class="section-datasets-choose__image-btn section-datasets-choose__image-btn--load-dataset"
      src="/img/svg/load-dataset.svg"
      alt="load-dataset-image"
      >
    <h2 class="section-datasets-choose__title-btn">
      Загрузить новый датасет
    </h2>
    <h3 class="section-datasets-choose__subtitle-btn">
      Поддерживаются форматы JPG
    </h3>
  </button>
  <button class="section-datasets-choose__button section-datasets-choose__button--choice">
    <img 
      class="section-datasets-choose__image-btn section-datasets-choose__image-btn--open-folder"
      src="/img/svg/open-folder.svg"
      alt="opend-folder-image"
      >
    <h2 class="section-datasets-choose__title-btn">
      Выбрать существующий
    </h2>
    <h3 class="section-datasets-choose__subtitle-btn">
      Откройте один из ваших сохраненных датасетов
    </h3>
  </button>
</section>
